; CDC com core oficial ST (STM32duino) — pilha USB diferente, mais compatível com clones
[env:cdc_stm32]
platform = ststm32
board = bluepill_f103c8
framework = arduino
upload_protocol = stlink
upload_flags =
    -c
    set CPUTAPID 0x2ba01477
build_flags = -D PIO_FRAMEWORK_ARDUINO_ENABLE_CDC
build_src_filter = -<main.cpp> +<cdc_test.cpp>
