name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: '--target x86_64-unknown-linux-gnu'
          - platform: windows-latest
            args: '--target x86_64-pc-windows-msvc'

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: configurator/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'windows-latest' && 'x86_64-pc-windows-msvc' || 'x86_64-unknown-linux-gnu' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libudev-dev

      - name: Install frontend dependencies
        working-directory: configurator
        run: npm ci

      - name: Build Tauri app (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: configurator
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: 'BluePill MIDI Trigger ${{ github.ref_name }}'
          releaseBody: |
            ## Instalação

            ### Linux (.deb — Ubuntu/Debian/Pop!_OS)
            ```bash
            sudo dpkg -i BluePill.MIDI.Trigger_*_amd64.deb
            sudo udevadm control --reload-rules && sudo udevadm trigger
            ```
            Desplugue e replugue o cabo USB da BluePill — pronto, sem relogar.

            ### Linux (.AppImage)
            ```bash
            chmod +x BluePill.MIDI.Trigger_*.AppImage
            ./BluePill.MIDI.Trigger_*.AppImage
            ```

            ### Windows
            Execute `BluePill.MIDI.Trigger_*_x64-setup.exe` como Administrador.
            Cria atalho na Área de Trabalho automaticamente.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false

      - name: Inject postinst into .deb (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          DEB=$(find configurator/src-tauri/target -name "*.deb" | grep -v ".sig" | head -1)
          echo "Patching: $DEB"
          WORKDIR=$(mktemp -d)
          dpkg-deb -R "$DEB" "$WORKDIR"
          install -m 755 configurator/src-tauri/linux/postinst "$WORKDIR/DEBIAN/postinst"
          dpkg-deb -b "$WORKDIR" "$DEB"
          echo "Patched .deb with postinst"

      - name: Upload patched .deb to release
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          DEB=$(find configurator/src-tauri/target -name "*.deb" | grep -v ".sig" | head -1)
          gh release upload ${{ github.ref_name }} "$DEB" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Tauri app (Windows)
        if: matrix.platform == 'windows-latest'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: configurator
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: 'BluePill MIDI Trigger ${{ github.ref_name }}'
          releaseBody: |
            ## Instalação Windows
            Execute o instalador `.exe` ou `.msi` como Administrador.
            Cria atalho na Área de Trabalho e Menu Iniciar automaticamente.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
