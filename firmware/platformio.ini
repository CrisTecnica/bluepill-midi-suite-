; Firmware principal — Maple core, USB composto MIDI + CDC no mesmo cabo
; MIDI vai para o sampler; CDC é o canal de configuração (app configurator)
; Linker customizado: código em 0x08000000 (sem offset de bootloader Maple)
[env:bluepill]
platform = ststm32
board = bluepill_f103c8
framework = arduino
board_build.core = maple
board_build.variant = generic_stm32f103c
board_build.ldscript = ld/stlink_c8_128k.ld
build_flags = -D GENERIC_BOOTLOADER
upload_protocol = stlink
upload_flags =
    -c
    set CPUTAPID 0x2ba01477
lib_deps =
    https://github.com/arpruss/USBComposite_stm32f1.git#43d2ad6cbc379cb61e7b8cf92a1fa6cac75eacf5
build_src_filter = -<*.cpp> +<main.cpp>

; USB MIDI + CDC composto no mesmo cabo (STM32duino core)
[env:bluepill_composite]
platform = ststm32
board = bluepill_f103c8
framework = arduino
upload_protocol = stlink
upload_flags =
    -c
    set CPUTAPID 0x2ba01477
build_flags =
    -D USBCON
    -D CUSTOM_USBD_PID=0x5700
    -D DEV_NUM_EP=6U
    -D HAL_PCD_MODULE_ENABLED
build_src_filter = -<*.cpp> +<main_stm32.cpp> +<usb_composite.cpp> +<usbd_desc.c> +<usbd_conf.c>
    +<usbd_core.c> +<usbd_ctlreq.c> +<usbd_ioreq.c> +<usbd_if.c>

; Fallback: STM32duino core — config via UART1 (PA9/PA10), sem CDC USB
[env:bluepill_uart]
platform = ststm32
board = bluepill_f103c8
framework = arduino
upload_protocol = stlink
upload_flags =
    -c
    set CPUTAPID 0x2ba01477
build_flags =
    -D USBCON
    -D USBD_USE_HID_COMPOSITE
    -D CUSTOM_USBD_PID=0x5700
build_src_filter = -<*.cpp> +<main_stm32.cpp> +<usb_midi.cpp>

[env:blink_test]
platform = ststm32
board = bluepill_f103c8
framework = arduino
board_build.core = maple
upload_protocol = stlink
upload_flags =
    -c
    set CPUTAPID 0x2ba01477
build_src_filter = -<main.cpp> +<blink_test.cpp>

; Mesmo blink mas com o core genérico da ST (HAL) — sem maple
