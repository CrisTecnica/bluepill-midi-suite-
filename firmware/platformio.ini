; CDC serial simples — sem USBComposite, testa se USB básico funciona
[env:cdc_test]
platform = ststm32
board = bluepill_f103c8
framework = arduino
board_build.core = maple
upload_protocol = stlink
upload_flags =
    -c
    set CPUTAPID 0x2ba01477
